name: Windows CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Format, lint, and build
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Shruti.sln

      - name: Verify formatting
        run: dotnet format Shruti.sln --verify-no-changes --verbosity minimal --no-restore

      - name: Lint and build
        run: dotnet build Shruti.sln --configuration Debug --no-restore -p:Platform=x64 -warnaserror

  test:
    name: Test ${{ matrix.test_class }}
    needs: validate
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        test_class:
          - DictationCoordinatorTests
          - DiagnosticsTests
          - DictationSessionStateTests
          - DictationShellControllerTests
          - DictationTriggerRouterTests
          - JsonSettingsRepositoryTests
          - PcmAudioNormalizerTests
          - SqliteSessionRepositoryTests
          - TranscriptExportServiceTests
          - WhisperCppTranscriptionEngineTests
          - WhisperCppTranscriptionProviderTests
          - WasapiAudioCaptureSourceTests
          - WindowsAudioCaptureServiceTests
          - WindowsGlobalTriggerServiceTests
          - WindowsTargetFocusServiceTests
          - WindowsTextInsertionServiceTests
          - WindowsTrayIconServiceTests

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run test class
        timeout-minutes: 5
        run: dotnet test tests/Shruti.Tests/Shruti.Tests.csproj --configuration Debug --filter "FullyQualifiedName~${{ matrix.test_class }}" --logger "console;verbosity=normal" -p:Platform=x64

  native:
    name: Build whisper.cpp native shim
    needs: validate
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure native build
        run: cmake -S src/Shruti.Transcription.WhisperCpp.Native -B artifacts/whispercpp-native -G "Visual Studio 17 2022" -A x64

      - name: Build native shim
        run: cmake --build artifacts/whispercpp-native --config Release

      - name: Run native smoke test
        run: ctest --test-dir artifacts/whispercpp-native -C Release --output-on-failure

  package:
    name: Build unsigned MSIX package
    needs: validate
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build MSIX package
        run: .\scripts\package-msix.ps1 -Configuration Release -Platform x64

      - name: Upload MSIX package
        uses: actions/upload-artifact@v4
        with:
          name: shruti-msix
          path: artifacts/installer/output/*.msix
