name: Windows CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Format, lint, build, and test
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Shruti.sln

      - name: Verify formatting
        run: dotnet format Shruti.sln --verify-no-changes --verbosity minimal --no-restore

      - name: Lint and build
        run: dotnet build Shruti.sln --configuration Debug --no-restore -p:Platform=x64 -warnaserror

      - name: Run tests
        timeout-minutes: 5
        run: dotnet test tests/Shruti.Tests/Shruti.Tests.csproj --configuration Debug --no-build --logger "trx;LogFileName=test-results.trx" --logger "console;verbosity=normal" -p:Platform=x64
